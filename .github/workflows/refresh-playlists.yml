name: Refresh Playlists Nightly

on:
  schedule:
    # Run daily at 4 AM EST (9 AM UTC)
    - cron: '0 9 * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  refresh-playlists:
    runs-on: ubuntu-latest
    
    steps:
    - name: Refresh All Playlists
      run: |
        echo "🔄 Refreshing all playlists..."
        BASE_URL="${BASE_URL:-https://stablekraft.app}"
        
        # Step 1: Refresh playlist cache
        echo "📋 Step 1: Refreshing playlist cache..."
        REFRESH_RESPONSE=$(curl -s -w "\n%{http_code}" "${BASE_URL}/api/playlist-cache?refresh=all")
        HTTP_CODE=$(echo "$REFRESH_RESPONSE" | tail -n1)
        RESPONSE_BODY=$(echo "$REFRESH_RESPONSE" | sed '$d')
        
        if [ "$HTTP_CODE" -eq 200 ]; then
          echo "✅ Playlist cache refreshed successfully"
          echo "$RESPONSE_BODY" | jq '.' || echo "$RESPONSE_BODY"
        else
          echo "❌ Failed to refresh playlist cache (HTTP $HTTP_CODE)"
          echo "$RESPONSE_BODY"
          exit 1
        fi
        
        # Wait a bit for cache to settle
        sleep 5

        # Playlist names used throughout
        PLAYLISTS=("hgh" "mmt" "sas" "mmm" "iam" "itdv" "b4ts" "upbeats" "flowgnar" "lt" "tft" "greatest-hits")

        # Step 2: Reparse ALL music feeds to detect new tracks FIRST
        # This must run BEFORE playlist refresh to catch new tracks
        echo ""
        echo "📋 Step 2: Reparsing music feeds to detect new tracks..."

        REPARSE_RESPONSE=$(curl -s -X POST -w "\n%{http_code}" "${BASE_URL}/api/admin/reparse-feeds?type=all&maxAgeHours=720&limit=5000")
        HTTP_CODE=$(echo "$REPARSE_RESPONSE" | tail -n1)
        RESPONSE_BODY=$(echo "$REPARSE_RESPONSE" | sed '$d')

        if [ "$HTTP_CODE" -eq 200 ]; then
          PROCESSED=$(echo "$RESPONSE_BODY" | jq -r '.stats.feedsProcessed // 0' 2>/dev/null || echo "?")
          NEW_TRACKS=$(echo "$RESPONSE_BODY" | jq -r '.stats.newTracksAdded // 0' 2>/dev/null || echo "?")
          FAILED=$(echo "$RESPONSE_BODY" | jq -r '.stats.feedsFailed // 0' 2>/dev/null || echo "?")
          DURATION=$(echo "$RESPONSE_BODY" | jq -r '.duration // "?"' 2>/dev/null || echo "?")
          echo "✅ Music feeds reparsed: ${PROCESSED} feeds, ${NEW_TRACKS} new tracks, ${FAILED} failed (${DURATION})"
        else
          echo "⚠️ Music feed reparse had issues (HTTP $HTTP_CODE) - continuing..."
        fi

        # Step 2b: Reparse podcast feeds (curated list — these are blacklisted from album view)
        # Uses per-feed reparse endpoint to ensure each podcast gets fresh episodes
        echo ""
        echo "📋 Step 2b: Reparsing podcast feeds for new episodes..."

        PODCAST_FEEDS=("3aebb7a8-5942-5ee7-a148-8bdc14f1f3d4" "two-for-tunestr-silvie")  # UpBeats, Two For Tunestr

        for FEED_ID in "${PODCAST_FEEDS[@]}"; do
          echo "  🔄 Reparsing podcast feed $FEED_ID..."
          PODCAST_REPARSE=$(curl -s -X POST -w "\n%{http_code}" "${BASE_URL}/api/admin/feeds/${FEED_ID}/reparse")
          HTTP_CODE=$(echo "$PODCAST_REPARSE" | tail -n1)
          RESPONSE_BODY=$(echo "$PODCAST_REPARSE" | sed '$d')
          if [ "$HTTP_CODE" -eq 200 ]; then
            NEW=$(echo "$RESPONSE_BODY" | jq -r '.newTracks // 0' 2>/dev/null || echo "?")
            TITLE=$(echo "$RESPONSE_BODY" | jq -r '.title // "?"' 2>/dev/null || echo "?")
            echo "  ✓ ${TITLE} reparsed: ${NEW} new episodes"
          else
            echo "  ⚠️ Podcast feed $FEED_ID reparse had issues (HTTP $HTTP_CODE) - continuing..."
          fi
          sleep 2
        done

        # Step 2c: Fix stale VTS data (empty remoteItem GUIDs from pre-entity-fix parsing)
        echo ""
        echo "📋 Step 2c: Fixing stale VTS data..."

        VTS_FIX_RESPONSE=$(curl -s -X POST -w "\n%{http_code}" "${BASE_URL}/api/admin/fix-stale-vts")
        HTTP_CODE=$(echo "$VTS_FIX_RESPONSE" | tail -n1)
        RESPONSE_BODY=$(echo "$VTS_FIX_RESPONSE" | sed '$d')

        if [ "$HTTP_CODE" -eq 200 ]; then
          FEEDS_FIXED=$(echo "$RESPONSE_BODY" | jq -r '.feedsFixed // 0' 2>/dev/null || echo "?")
          TRACKS_UPDATED=$(echo "$RESPONSE_BODY" | jq -r '.tracksUpdated // 0' 2>/dev/null || echo "?")
          DURATION=$(echo "$RESPONSE_BODY" | jq -r '.duration // "?"' 2>/dev/null || echo "?")
          echo "✅ Stale VTS fix: ${FEEDS_FIXED} feeds, ${TRACKS_UPDATED} tracks updated (${DURATION})"
        else
          echo "⚠️ Stale VTS fix had issues (HTTP $HTTP_CODE) - non-critical"
        fi

        # Step 3: Refresh playlists with full v4v parsing
        echo ""
        echo "📋 Step 3: Refreshing playlists with full RSS parsing (includes v4v payment data)..."

        for PLAYLIST in "${PLAYLISTS[@]}"; do
          echo "  🔄 Refreshing $PLAYLIST playlist..."
          curl -s "${BASE_URL}/api/playlist/${PLAYLIST}?refresh=true" > /dev/null

          if [ $? -eq 0 ]; then
            echo "  ✓ $PLAYLIST refreshed"
          else
            echo "  ⚠️ $PLAYLIST refresh had issues (non-critical)"
          fi

          # Small delay to avoid rate limiting
          sleep 2
        done

        echo ""
        echo "✅ All playlists refreshed with full v4v parsing"

        # Step 4: Parse newly discovered feeds
        echo ""
        echo "📋 Step 4: Parsing newly discovered feeds..."

        # Parse feeds multiple times to ensure all feeds are processed
        # (parse-feeds processes 50 feeds at a time)
        MAX_ITERATIONS=10
        ITERATION=0

        while [ $ITERATION -lt $MAX_ITERATIONS ]; do
          ITERATION=$((ITERATION + 1))
          echo "  🔄 Parse iteration $ITERATION/$MAX_ITERATIONS..."

          PARSE_RESPONSE=$(curl -s -X POST -w "\n%{http_code}" "${BASE_URL}/api/playlist/parse-feeds")
          HTTP_CODE=$(echo "$PARSE_RESPONSE" | tail -n1)
          RESPONSE_BODY=$(echo "$PARSE_RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -eq 200 ]; then
            # Check if any feeds were parsed
            PARSED_COUNT=$(echo "$RESPONSE_BODY" | jq -r '.parsed // 0' 2>/dev/null || echo "0")

            if [ "$PARSED_COUNT" -eq 0 ]; then
              echo "  ✅ No more unparsed feeds found"
              break
            else
              echo "  ✓ Parsed $PARSED_COUNT feeds"
              # Small delay between iterations
              sleep 3
            fi
          else
            echo "  ⚠️ Parse iteration failed (HTTP $HTTP_CODE), continuing..."
            break
          fi
        done

        echo ""
        echo "✅ Feed parsing completed - tracks saved to database"

        # Step 5: Parse publisher feeds to update album relationships
        echo ""
        echo "📋 Step 5: Parsing publisher feeds to update album relationships..."

        PUBLISHER_RESPONSE=$(curl -s -X POST -w "\n%{http_code}" "${BASE_URL}/api/parse-feeds?action=parse-publishers")
        HTTP_CODE=$(echo "$PUBLISHER_RESPONSE" | tail -n1)
        RESPONSE_BODY=$(echo "$PUBLISHER_RESPONSE" | sed '$d')

        if [ "$HTTP_CODE" -eq 200 ]; then
          PARSED=$(echo "$RESPONSE_BODY" | jq -r '.result.parsed // 0' 2>/dev/null || echo "?")
          LINKED=$(echo "$RESPONSE_BODY" | jq -r '.result.linked // 0' 2>/dev/null || echo "?")
          echo "✅ Publisher feeds parsed: ${PARSED} feeds processed, ${LINKED} albums linked"
        else
          echo "⚠️ Publisher parsing had issues (HTTP $HTTP_CODE) - non-critical"
        fi

        # Step 5b: Import missing albums from publisher feeds
        echo ""
        echo "📋 Step 5b: Importing missing albums from publisher feeds..."

        IMPORT_RESPONSE=$(curl -s -X POST -w "\n%{http_code}" "${BASE_URL}/api/admin/publishers/import-albums")
        HTTP_CODE=$(echo "$IMPORT_RESPONSE" | tail -n1)
        RESPONSE_BODY=$(echo "$IMPORT_RESPONSE" | sed '$d')

        if [ "$HTTP_CODE" -eq 200 ]; then
          IMPORTED=$(echo "$RESPONSE_BODY" | jq -r '.totals.imported // 0' 2>/dev/null || echo "?")
          SKIPPED=$(echo "$RESPONSE_BODY" | jq -r '.totals.skipped // 0' 2>/dev/null || echo "?")
          echo "✅ Publisher album import: ${IMPORTED} imported, ${SKIPPED} skipped"
        else
          echo "⚠️ Publisher album import had issues (HTTP $HTTP_CODE) - non-critical"
        fi

        # Step 6: Final playlist refresh to include newly parsed tracks
        echo ""
        echo "📋 Step 6: Final playlist refresh to include newly parsed tracks in SystemPlaylist..."

        for PLAYLIST in "${PLAYLISTS[@]}"; do
          echo "  🔄 Final refresh $PLAYLIST..."
          curl -s "${BASE_URL}/api/playlist/${PLAYLIST}?refresh=true" > /dev/null

          if [ $? -eq 0 ]; then
            echo "  ✓ $PLAYLIST updated with new tracks"
          else
            echo "  ⚠️ $PLAYLIST final refresh had issues (non-critical)"
          fi

          sleep 2
        done

        echo ""
        echo "✅ All playlists updated with newly parsed tracks"

        echo ""
        echo "✨ Playlist refresh workflow completed"
      env:
        BASE_URL: ${{ secrets.PLAYLIST_BASE_URL || 'https://stablekraft.app' }}

